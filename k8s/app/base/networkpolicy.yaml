# Default-deny all traffic in the namespace, then allow only the required flows
# (defense in depth at the pod-network layer).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: redemption
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: redemption-api
  namespace: redemption
spec:
  podSelector:
    matchLabels:
      app: redemption-api
  policyTypes: [Ingress, Egress]
  ingress:
    # Allow the ALB (via the load balancer controller) to reach the app port.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: TCP
          port: 3000
  egress:
    # DNS
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # PostgreSQL to the RDS Proxy (outside the cluster CIDR).
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 5432
