apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: redemption-api
  namespace: redemption
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: redemption-api
  minReplicas: 3
  maxReplicas: 100
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    # Requests-per-second per pod (via Prometheus Adapter) — reacts to the real
    # traffic signal faster/more accurately than CPU alone for spiky load.
    - type: Pods
      pods:
        metric:
          name: http_requests_per_second
        target:
          type: AverageValue
          averageValue: "50"
  behavior:
    scaleUp:
      # Absorb spikes fast: no stabilization, double pods (or +10) every 15s.
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
        - type: Pods
          value: 10
          periodSeconds: 15
      selectPolicy: Max
    scaleDown:
      # Scale in slowly to avoid thrashing when a sale ends.
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60
