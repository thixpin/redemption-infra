# Default-deny all traffic in the namespace, then allow only the required flows
# (defense in depth at the pod-network layer).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: redemption
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: redemption-api
  namespace: redemption
spec:
  podSelector:
    matchLabels:
      app: redemption-api
  policyTypes: [Ingress, Egress]
  ingress:
    # The ALB uses target-type: ip, so it connects from its ENIs in the VPC
    # (public subnets) — not from a pod. Allow the VPC CIDR on the app port so
    # ALB health checks and traffic reach the pods. Narrow to the public-subnet
    # CIDRs if you want it tighter. Must match var.vpc_cidr.
    - from:
        - ipBlock:
            cidr: 10.0.0.0/16
      ports:
        - protocol: TCP
          port: 3000
    # Allow Prometheus (kube-prometheus-stack) to scrape :3000/metrics.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 3000
  egress:
    # DNS
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # PostgreSQL to the RDS Proxy (in the VPC's isolated DB subnets). Scoped to
    # the VPC CIDR so pods can't reach arbitrary external databases. Must match
    # var.vpc_cidr.
    - to:
        - ipBlock:
            cidr: 10.0.0.0/16
      ports:
        - protocol: TCP
          port: 5432
---
# Egress for the PreSync migration Job (labeled app: redemption-api-migrate so
# the PDB/Service selectors don't match it). Same DNS + DB egress as the app.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: redemption-api-migrate
  namespace: redemption
spec:
  podSelector:
    matchLabels:
      app: redemption-api-migrate
  policyTypes: [Egress]
  egress:
    # DNS
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # PostgreSQL to the RDS Proxy. Must match var.vpc_cidr.
    - to:
        - ipBlock:
            cidr: 10.0.0.0/16
      ports:
        - protocol: TCP
          port: 5432
