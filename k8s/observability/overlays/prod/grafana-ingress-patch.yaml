# Prod Grafana on the prod account's shared admin ALB. Fill the placeholders
# with PROD-account resources (ACM cert covering the host, office/VPN CIDRs).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana
  namespace: monitoring
  annotations:
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:ap-southeast-1:770385967466:certificate/2d098864-53c0-4736-a347-a1329eb5bcb9
    alb.ingress.kubernetes.io/inbound-cidrs: 34.180.37.226/32,34.21.158.178/32
spec:
  rules:
    - host: redemption-grafana.thixpin.me
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kube-prometheus-stack-grafana
                port:
                  number: 80
