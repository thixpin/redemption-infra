apiVersion: apps/v1
kind: Deployment
metadata:
  name: redemption-api
  namespace: redemption
spec:
  replicas: 2
  template:
    spec:
      containers:
        - name: redemption-api
          image: 801100257021.dkr.ecr.ap-southeast-1.amazonaws.com/redemption/redemption-api:dev
          env:
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "service.namespace=redemption,deployment.environment=dev"
