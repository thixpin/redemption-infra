# Prod-account IRSA role for External Secrets. Fill from the prod apply:
#   terraform -chdir=terraform output app_secrets_irsa_role_arn
apiVersion: v1
kind: ServiceAccount
metadata:
  name: redemption-secretstore
  namespace: redemption
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::770385967466:role/redemption-prod-external-secrets
