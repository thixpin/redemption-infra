# PROD app — applied on the PROD cluster's own Argo CD (separate AWS account).
# Deploys are gated by release tags: CI bumps overlays/prod on `v*` tags only.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: redemption-api-prod
  namespace: argocd
  finalizers:
    - argocd.argoproj.io/resources-finalizer
spec:
  project: redemption
  source:
    repoURL: https://github.com/thixpin/redemption-infra.git
    targetRevision: main
    path: k8s/app/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: redemption
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
  revisionHistoryLimit: 10
  # The HPA owns replica count at runtime; don't let selfHeal fight it.
  ignoreDifferences:
    - group: apps
      kind: Deployment
      name: redemption-api
      namespace: redemption
      jsonPointers:
        - /spec/replicas
