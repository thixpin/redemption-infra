# Syncs the DB credentials from AWS Secrets Manager into a Kubernetes Secret,
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secrets
  namespace: redemption
spec:
  provider:
    aws:
      service: SecretsManager
      region: ap-southeast-1
      auth:
        jwt:
          serviceAccountRef:
            name: redemption-secretstore
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: redemption-db
  namespace: redemption
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets
    kind: SecretStore
  target:
    name: redemption-db
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        # postgres://user:pass@proxy-host:5432/dbname?sslmode=no-verify
        # The RDS Proxy has require_tls=true; sslmode=no-verify makes node-postgres
        # connect over TLS (rejectUnauthorized=false) without bundling the RDS CA.
        # For stricter verification, ship the RDS global CA and use verify-full.
        DATABASE_URL: "postgres://{{ .username }}:{{ .password }}@{{ .host }}:{{ .port }}/{{ .dbname }}?sslmode=no-verify"
  dataFrom:
    # Must match the Secrets Manager secret Terraform creates: "${local.name}/db/credentials".
    # For dev that is redemption-dev/db/credentials. When adding more envs, patch this per overlay.
    - extract:
        key: redemption-dev/db/credentials
