apiVersion: apps/v1
kind: Deployment
metadata:
  name: redemption-api
  namespace: redemption
  labels:
    app: redemption-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: redemption-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0      # keep full capacity during rollout (zero downtime)
      maxSurge: 1
  template:
    metadata:
      labels:
        app: redemption-api
    spec:
      serviceAccountName: redemption-api
      # Spread replicas across AZs and nodes so no single failure removes a majority.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: redemption-api
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: redemption-api
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: redemption-api
          image: 801100257021.dkr.ecr.ap-southeast-1.amazonaws.com/redemption/redemption-api:dev
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: NODE_ENV
              value: "production"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: redemption-db
                  key: DATABASE_URL
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          startupProbe:
            httpGet: { path: /health, port: http }
            failureThreshold: 30
            periodSeconds: 2
          readinessProbe:
            httpGet: { path: /health, port: http }
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet: { path: /health, port: http }
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      terminationGracePeriodSeconds: 30
