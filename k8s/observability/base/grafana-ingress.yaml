apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana
  namespace: monitoring
  annotations:
    # Shared admin ALB with the Argo CD ingress (argocd/ingress.yaml)
    alb.ingress.kubernetes.io/group.name: redemption-admin
    alb.ingress.kubernetes.io/group.order: "10"
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    # Replace with an ACM cert ARN that covers redemption-grafana-dev.thixpin.me.
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:ap-southeast-1:801100257021:certificate/e1b6f044-bac8-435b-8826-d9ab3304ad38
    alb.ingress.kubernetes.io/healthcheck-path: /api/health
    # REPLACE with your office/VPN CIDR(s). Do not leave open to the internet.
    alb.ingress.kubernetes.io/inbound-cidrs: 34.180.37.226/32,34.21.158.178/32
spec:
  ingressClassName: alb
  rules:
    - host: redemption-grafana-dev.thixpin.me
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                # Service created by kube-prometheus-stack (verify the name with
                # `kubectl -n monitoring get svc | grep grafana`).
                name: kube-prometheus-stack-grafana
                port:
                  number: 80
